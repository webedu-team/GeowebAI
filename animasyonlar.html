<html>
    <head>
        <title>Animasyon Örnekleri</title>
        <style>
div {
  width: 150px;
  height: 150px;
  background-color: red;
  position: relative;
  border-radius:50px ;
  animation-name: example;
  animation-duration: 4s;
}
.img1
{
    width:100px;
    height:100px;
    margin:25px;
    border-radius: 50px;
}

@keyframes example {
  0%   {background-color:red; left:0px; top:0px; border-radius:50px ;}
  25%  {background-color:yellow; left:200px; top:0px; border-radius:100px ;}
  50%  {background-color:blue; left:200px; top:200px; border-radius:50px ;}
  75%  {background-color:green; left:0px; top:200px; border-radius:100px ;}
  100% {background-color:red; left:0px; top:0px; border-radius:50px ;}
}
</style>
    </head>
    <body>
    <div><img class="img1" src="rakamlar.jpg"> </div><br>
    </body>
</html>
